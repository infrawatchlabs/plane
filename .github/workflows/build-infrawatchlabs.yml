name: Build & Push InfraWatch Plane Images

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version tag (e.g. v1.0.0). Leave empty for branch-name tag."
        type: string
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_ORG: infrawatchlabs

jobs:
  setup:
    name: Build Setup
    runs-on: ubuntu-22.04
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
      is_release: ${{ steps.vars.outputs.is_release }}
    steps:
      - name: Set build variables
        id: vars
        run: |
          if [ -n "${{ github.event.inputs.release_version }}" ]; then
            TAG="${{ github.event.inputs.release_version }}"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            TAG=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9.-]//g')
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "::notice::Building with tag: ${TAG}"

  build-web:
    name: Build plane-web
    runs-on: ubuntu-22.04
    needs: [setup]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web/Dockerfile.web
          push: true
          tags: |
            ${{ env.DOCKER_ORG }}/plane-web:${{ needs.setup.outputs.image_tag }}
            ${{ env.DOCKER_ORG }}/plane-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-space:
    name: Build plane-space
    runs-on: ubuntu-22.04
    needs: [setup]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/space/Dockerfile.space
          push: true
          tags: |
            ${{ env.DOCKER_ORG }}/plane-space:${{ needs.setup.outputs.image_tag }}
            ${{ env.DOCKER_ORG }}/plane-space:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-admin:
    name: Build plane-admin
    runs-on: ubuntu-22.04
    needs: [setup]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/admin/Dockerfile.admin
          push: true
          tags: |
            ${{ env.DOCKER_ORG }}/plane-admin:${{ needs.setup.outputs.image_tag }}
            ${{ env.DOCKER_ORG }}/plane-admin:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-live:
    name: Build plane-live
    runs-on: ubuntu-22.04
    needs: [setup]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/live/Dockerfile.live
          push: true
          tags: |
            ${{ env.DOCKER_ORG }}/plane-live:${{ needs.setup.outputs.image_tag }}
            ${{ env.DOCKER_ORG }}/plane-live:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-api:
    name: Build plane-api
    runs-on: ubuntu-22.04
    needs: [setup]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile.api
          push: true
          tags: |
            ${{ env.DOCKER_ORG }}/plane-api:${{ needs.setup.outputs.image_tag }}
            ${{ env.DOCKER_ORG }}/plane-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-proxy:
    name: Build plane-proxy
    runs-on: ubuntu-22.04
    needs: [setup]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./apps/proxy
          file: ./apps/proxy/Dockerfile.ce
          push: true
          tags: |
            ${{ env.DOCKER_ORG }}/plane-proxy:${{ needs.setup.outputs.image_tag }}
            ${{ env.DOCKER_ORG }}/plane-proxy:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  summary:
    name: Build Summary
    runs-on: ubuntu-22.04
    needs:
      - setup
      - build-web
      - build-space
      - build-admin
      - build-live
      - build-api
      - build-proxy
    steps:
      - name: Summary
        run: |
          TAG="${{ needs.setup.outputs.image_tag }}"
          echo "## Build Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | Tag |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-----|" >> "$GITHUB_STEP_SUMMARY"
          echo "| infrawatchlabs/plane-web | ${TAG} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| infrawatchlabs/plane-space | ${TAG} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| infrawatchlabs/plane-admin | ${TAG} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| infrawatchlabs/plane-live | ${TAG} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| infrawatchlabs/plane-api | ${TAG} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| infrawatchlabs/plane-proxy | ${TAG} |" >> "$GITHUB_STEP_SUMMARY"
